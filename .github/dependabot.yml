version: 2
updates:
  # Frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies", "frontend"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]

  # Python services share the same dependency style; add more entries as needed,
  # one per directory that contains a requirements.txt you want tracked, e.g.:
  # - package-ecosystem: "pip"
  #   directory: "/ai"
  #   schedule:
  #     interval: "weekly"
