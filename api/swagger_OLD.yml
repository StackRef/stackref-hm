openapi: 3.0.3
info:
  title: stackref_main
  description: >
    This is the primary API for all StackRef calls from the Primary Frontend,
    the Coach application, and the Websocket server.
  version: 1.11.0
  contact:
    name: Jordan Avery
    email: admin@example.com
servers:
  - url: https://api.example.com
  - url: https://demo.example.com/api
  - url: https://{apigw_id}.execute-api.us-east-1.amazonaws.com
    variables:
      apigw_id:
        description: The AWS API Gateway ID
        default: 33t7jq9x85
paths:
  /amznMktEntitlement:
    get:
      summary: Retrieve/update details of an Amazon Marketplace entitlement
      tags:
        - amzMkt
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: x-amzn-marketplace-token
          in: query
          description: Token retrieved when customer clicks the "setup" link in AWS Marketplace
          required: true
          schema:
            type: string
        - name: organization_uuid
          in: query
          description: |
            Organization UUID

            Only necessary when being called from a non-user or platform admin
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
        '204':
          description: No results
        '403':
          description: Not authorized
        default:
          description: Default response for GET /amzMktEntitlement
    post:
      summary: Process an entitlement
      tags:
        - amzMkt
      description: Used for processing an Amazon Marketplace entitlement for an Organization
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: organization_uuid
          in: query
          description: |
            Organization UUID

            Only necessary when being called from a non-user or platform admin
          required: false
          schema:
            type: string
            format: uuid
      requestBody:
        description: Entitlement process payload
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  default: utilize
                entitlement:
                  type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    example: 200
                  cloud_account_user_uuid:
                    type: string
                    format: uuid
        '403':
          description: Not authorized
        default:
          description: Default response for POST /amzMktEntitlement
  /assetCreate:
    post:
      summary: Create an asset such as an image, invitation list, etc.
      tags:
        - asset
      description: Used for uploading or creating assets stored in S3 and referenced in DB
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: asset_entity_uuid
          in: query
          description: |
            Entity UUID (event, team, etc.) owning the Asset
          required: true
          schema:
            type: string
            format: uuid
        - name: asset_type
          in: query
          description: |
            Asset type being added (avatar_image, banner_image, invitation_list, etc.)
          required: true
          schema:
            type: string
            example: avatar_image
      requestBody:
        description: Asset Create payload (JSON object or multipart)
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                filepond:
                  type: string
                  format: binary
                  description: File content
              description: Asset Create payload (multipart)
          application/json:
            schema:
              type: object
              properties:
                entity_name:
                  type: string
                  description: Name of Team, Event, etc. used as basis for AI-generated image
              description: Asset Create payload (JSON)
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    account_uuid:
                      type: string
                      format: uuid
                    account_cloud_id:
                      type: string
                    account_name:
                      type: string
                    account_owner_uuid:
                      type: string
                      format: uuid
        '403':
          description: Not authorized
        default:
          description: Default response for POST /assetCreate
  /assetDelete:
    post:
      summary: Delete a previously-stored asset such as an image, invitation list, etc.
      tags:
        - asset
      description: Used for deleting uploaded assets from the DB and S3
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Asset Delete payload
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                asset_entity_uuid:
                  type: string
                  format: uuid
                asset_uuid:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    account_uuid:
                      type: string
                      format: uuid
                    account_cloud_id:
                      type: string
                    account_name:
                      type: string
                    account_owner_uuid:
                      type: string
                      format: uuid
        '403':
          description: Not authorized
        default:
          description: Default response for POST /assetDelete
  /assetRead:
    get:
      summary: Retrieve a previously-stored asset such as an image, invitation list, etc.
      tags:
        - asset
      description: Used for reading binary uploaded asset data
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: entity_uuid
          in: query
          description: |
            Entity UUID

            For now this is required and must match the UUID of an Organization, Event, Team, or User.
          required: true
          schema:
            type: string
            format: uuid
        - name: asset_uuid
          in: query
          description: Asset UUID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/octet-stream:
              schema:
                type: string
                format: byte
        '403':
          description: Not authorized
        default:
          description: Default response for POST /assetRead
  /cloudAccountRead:
    get:
      summary: Retrieve details of one or many Cloud Accounts
      tags:
        - cloudAccount
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: entity_uuid
          in: query
          description: |
            Entity UUID

            For now this is required and must match the UUID of an Organization, Event, Team, or User.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/cloudAccountRead_defaultResponse'
                  - $ref: '#/components/schemas/cloudAccountRead_emptyResponse'
        '204':
          description: No results
        '403':
          description: Not authorized
        default:
          description: Default response for GET /cloudAccountRead
  /cloudAccountUpdate:
    post:
      summary: Update a Cloud Account on the platform
      tags:
        - cloudAccount
      description: Used for assigning/unassigning cloud accounts to teams, etc.
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Cloud Account payload
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/cloudAccountUpdate_assignPayload'
                - $ref: '#/components/schemas/cloudAccountUpdate_unassignAllPayload'
                - $ref: '#/components/schemas/cloudAccountUpdate_unassignOnePayload'
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    account_uuid:
                      type: string
                      format: uuid
                    account_cloud_id:
                      type: string
                    account_name:
                      type: string
                    account_owner_uuid:
                      type: string
                      format: uuid
        '403':
          description: Not authorized
        default:
          description: Default response for POST /cloudAccountUpdate
  /cloudAccountUserCreate:
    post:
      summary: Create a Cloud Account User on the platform
      tags:
        - cloudAccount
      description: Used for granting a User access to a Cloud Account
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Cloud Account User payload
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/cloudAccountUserCreate_teamPayload'
                - $ref: '#/components/schemas/cloudAccountUserCreate_eventPayload'
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    example: 200
                  cloud_account_user_uuid:
                    type: string
                    format: uuid
        '403':
          description: Not authorized
        default:
          description: Default response for POST /cloudAccountUserCreate
  /cloudAccountUserDelete:
    post:
      summary: Delete a Cloud Account User from the platform and cloud
      tags:
        - cloudAccount
      description: Used for removing a User's access to a Cloud Account
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Cloud Account User payload
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/cloudAccountUserDelete_teamPayload'
                - $ref: '#/components/schemas/cloudAccountUserDelete_eventPayload'
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    example: 200
                  user_uuid:
                    type: string
                    format: uuid
                  cloud_account_user_id:
                    type: string
        '403':
          description: Not authorized
        default:
          description: Default response for POST /cloudAccountUserDelete
  /cloudAccountUserUpdate:
    post:
      summary: Update a Cloud Account User on the platform and cloud
      tags:
        - cloudAccount
      description: Used for removing a User's access to Cloud Account Groups
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Cloud Account User payload
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/cloudAccountUserUpdate_defaultPayload'
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status_code:
                    type: number
                    example: 200
                  user_uuid:
                    type: string
                    format: uuid
                  cloud_account_user_id:
                    type: string
        '403':
          description: Not authorized
        default:
          description: Default response for POST /cloudAccountUserUpdate
  /coinBankRead:
    get:
      summary: Retrieve details of one or many Banks
      tags:
        - stackCash
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: entity_uuid
          in: query
          description: |
            Entity UUID

            For now this is required and must match the UUID of an Organization, Event, or Team.
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    entity_uuid:
                      type: string
                      format: uuid
                    balance_value:
                      type: number
                      format: double
        '204':
          description: No results
        '403':
          description: Not authorized
        default:
          description: Default response for GET /coinBankRead
  /coinBankUpdate:
    post:
      summary: Update a Coin Bank on the platform
      tags:
        - stackCash
      description: Used for moving StackRef Coin into, out-of, or between accounts
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Coin Bank transaction
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  default: transaction
                  example: transaction
                transaction:
                  type: object
                  properties:
                    sending_entity_uuid:
                      type: string
                      format: uuid
                      example: 00000000-0000-0000-0000-000000000000
                    receiving_entity_uuid:
                      type: string
                      format: uuid
                    transaction_value:
                      type: number
                      format: double
      responses:
        '403':
          description: Not authorized
        default:
          description: Default response for POST /coinBankUpdate
  /eventCreate:
    post:
      summary: Create a new Event on the platform
      tags:
        - event
      description: Creates a new Event when supplied with its details. Returns `event_uuid`.
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Event creation information
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  default: create
                  example: create
                event:
                  type: object
                  properties:
                    organization_uuid:
                      type: string
                      format: uuid
                    ts_event_start:
                      type: string
                      example: "2022-01-01 00:00:00.000"
                    ts_event_end:
                      type: string
                      example: "2022-01-08 00:00:00.000"
                    event_judging_minutes:
                      type: number
                    cloud_accounts_enabled:
                      type: boolean
                    add_all_users:
                      type: boolean
                    generate_image:
                      type: boolean
                    event_type_id:
                      type: number
                      example: 1
                    event_team_form_mode_id:
                      type: number
                      example: 1
                    event_details:
                      type: object
                      properties:
                        event_name:
                          type: string
                        event_summary:
                          type: string
                        event_description:
                          type: string
                        event_max_team_size:
                          type: number
                          example: 2
                    entity_asset:
                      type: string
                      example: "{\"status_code\":200,\"asset_entity_uuid\":\"c2b55dce-c710-4d8e-9ab5-cec08250a5bc\",\"asset_uuid\":\"6ee33d65-6d1f-4bc5-8ba7-61b70cf6aab2\"}"
      responses:
        '403':
          description: Not authorized
        default:
          description: Default response for POST /eventCreate
  /eventRead:
    get:
      summary: Retrieve details of one or many Events
      tags:
        - event
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          description: Alternate action to perform (i.e., 'judging_status')
          required: false
          schema:
            type: string
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
        - name: organization_uuid
          in: query
          description: |
            Organization UUID

            Only required if the Bearer token is for a User only with grants to Read that Organization's details
          required: false
          schema:
            type: string
            format: uuid
            default: c2b55dce-c710-4d8e-9ab5-cec08250a5bc
        - name: event_uuid
          in: query
          description: |
            Event UUID

            Only required if the Bearer token is for a User only with grants to Read that Event's details
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/eventRead_defaultResponse'
                  - $ref: '#/components/schemas/eventRead_judgingStatusResponse'
                  - $ref: '#/components/schemas/eventRead_eventActivityResponse'
        '204':
          description: No results
        '403':
          description: Not authorized
        default:
          description: Default response for GET /eventRead
  /eventUpdate:
    post:
      summary: Update an Event on the platform
      tags:
        - event
      description: Updates an Event Team when supplied with its details. Returns `team_uuid`.
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: Event update information
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  default: update
                  example: update|delete
                team:
                  type: object
                  properties:
                    event_uuid:
                      type: string
                      format: uuid
                    organization_uuid:
                      type: string
                      format: uuid
                    ts_event_start:
                      type: string
                      format: date-time
                    ts_event_end:
                      type: string
                      format: date-time
                    event_judging_minutes:
                      type: number
                    event_status_id:
                      type: number
                    cloud_accounts_enabled:
                      type: boolean
                    event_type_id:
                      type: number
                    event_team_form_mode_id:
                      type: number
                    event_details:
                      type: object
                      properties:
                        event_name:
                          type: string
                        event_summary:
                          type: string
                        event_description:
                          type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_uuid:
                    type: string
                    format: uuid
                  updated:
                    type: boolean
        '403':
          description: Not authorized
        default:
          description: Default response for POST /eventUpdate
  /generateUUID:
    get:
      summary: Simple UUID generator for use in other calls
      tags:
        - other
      description: >
        Use this call to generate a unique UUID to be used in playbook creation, etc.
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  uuid:
                    type: string
                    format: uuid
          links:
            GeneratedUUID:
              parameters:
                description: Generated UUID
                uuid: $response.body#/uuid
        default:
          description: Default response for GET /generateUUID
  /getUser:
    post:
      summary: Method for to read User information from StackRef database
      tags:
        - user
      description: Retrieves User information details
      security:
        - bearerAuth: []
      parameters:
        - name: x-sr-application
          in: header
          description: What application/version is calling the API
          required: true
          style: simple
          schema:
            type: string
            default: SR/Swagger
      requestBody:
        description: User information payload. Specify only one of `auth_provider_id` or user_uuid but not both.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    auth_provider_id:
                      type: string
                      default: google-oauth2|107264207147211635796
                      example: google-oauth2|107264207147211635796
                    user_uuid:
                      type: string
                      format: uuid
                      default: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
                      example: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
      responses:
        '200':
          description: Successful operation
          headers:
            Content-Type:
              schema:
                type: string
              description: The MIME type of the payload
            Content-Length:
              schema:
                type: number
              description: Byte length of the payload
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user_uuid:
                      type: string
                      format: uuid
                    organization_uuid:
                      type: string
                      format: uuid
                    organization_name:
                      type: string
                    email_verified:
                      type: boolean
                    first_name:
                      type: string
                    last_name:
                      type: string
                    registered:
                      type: boolean
                    ts_last_login:
                      type: string
                      format: date-time
                    tags:
                      type: object
                      properties:
                        skills:
                          type: array
                          items:
                            type: string
                          example: [python,java,mysql]
                    settings:
                      type: object
                    user_role_grants:
                      type: array
                      items:
                        type: string
                      example: [ui,organization_read,organization_write]
        '403':
          description: Not authorized
        default:
          description: Default response for POST /getUser
