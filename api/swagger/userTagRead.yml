get:
  summary: Retrieve a User's tags
  tags:
    - user
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                user_tag_name:
                  type: string
                user_tag_type:
                  type: string
                user_tag_category:
                  type: string
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /userTagRead
