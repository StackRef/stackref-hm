get:
  summary: Retrieve details of one or many Cloud Accounts
  tags:
    - cloudAccount
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: entity_uuid
      in: query
      description: |
        Entity UUID

        For now this is required and must match the UUID of an Organization, Event, Team, or User.
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/cloudAccountRead_defaultResponse'
              - $ref: '#/components/schemas/cloudAccountRead_emptyResponse'
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /cloudAccountRead
components:
  schemas:
    cloudAccountRead_defaultResponse:
      type: array
      items:
        type: object
        properties:
          cloud_account_uuid:
            type: string
            format: uuid
          cloud_account_cloud_id:
            type: string
          cloud_account_provider_id:
            type: number
          cloud_account_name:
            type: string
          cloud_account_status_id:
            type: number
          cloud_account_users:
            type: array
            items:
              type: object
              properties:
                user_uuid:
                  type: string
                  format: uuid
    cloudAccountRead_emptyResponse:
      type: object
      properties:
        message:
          type: string
          example: "No accounts exist for 00000000-0000-0000-0000-000000000000"
