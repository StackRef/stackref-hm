get:
  summary: Retrieve Team members
  tags:
    - teamMember
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: team_uuid
      in: query
      description: |
        Team UUID
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                team_member_uuid:
                  type: string
                  format: uuid
                team_uuid:
                  type: string
                  format: uuid
                participant_uuid:
                  type: string
                  format: uuid
                first_name:
                  type: string
                last_name:
                  type: string
                email_address:
                  type: string
                  format: email
                ts_last_login:
                  type: string
                  format: date-time
                team_member_roles:
                  type: array
                  items:
                    type: object
                    properties:
                      team_member_role_id:
                        type: number
                        format: int32
                      team_member_role_name:
                        type: string
                        example: Player|Captain
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /teamMemberRead
