get:
  summary: Retrieve/update details of an Amazon Marketplace entitlement
  tags:
    - amzMkt
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: x-amzn-marketplace-token
      in: query
      description: Token retrieved when customer clicks the "setup" link in AWS Marketplace
      required: true
      schema:
        type: string
    - name: organization_uuid
      in: query
      description: |
        Organization UUID

        Only necessary when being called from a non-user or platform admin
      required: false
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              customer_id:
                type: string
              customer_aws_account_id:
                type: string
              entitlements:
                type: array
                items:
                  type: string
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /amzMktEntitlement
post:
  summary: Process an entitlement
  tags:
    - amzMkt
  description: Used for processing an Amazon Marketplace entitlement for an Organization
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: organization_uuid
      in: query
      description: |
        Organization UUID

        Only necessary when being called from a non-user or platform admin
      required: false
      schema:
        type: string
        format: uuid
  requestBody:
    description: Entitlement process payload
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              default: utilize
            entitlement:
              type: string
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                status_code:
                  type: number
                  example: 200
                entitlement_uuid:
                  type: string
                  format: uuid
                organization_uuid:
                  type: string
                  format: uuid
                transaction_value:
                  type: number
                  format: double
    '403':
      description: Not authorized
    default:
      description: Default response for POST /amzMktEntitlement
