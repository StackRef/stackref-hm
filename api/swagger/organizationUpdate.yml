post:
  summary: Update an existing Organization on the platform
  tags:
    - organization
  description: Updates an existing Organization when supplied with its details. Returns status code.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: organization_uuid
      in: query
      description: The organization_uuid of the Organization to update
      required: true
      schema:
        type: string
        format: uuid
        default: c2b55dce-c710-4d8e-9ab5-cec08250a5bc
        example: c2b55dce-c710-4d8e-9ab5-cec08250a5bc
  requestBody:
    description: Organization update information
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              default: update
              example: update
            organization:
              type: object
              properties:
                organization_name:
                  type: string
                  default: Acme Co.
                  example: Acme Co.
                organization_domain:
                  type: string
                  default: acme.com
                  example: acme.com
                primary_contact_email:
                  type: string
                  default: foo@acme.com
                  example: foo@acme.com
                street_address_1:
                  type: string
                  default: 1 Foobar Rd.
                  example: 1 Foobar Rd.
                street_address_2:
                  type: string
                  example: 2nd Floor
                city:
                  type: string
                  default: Eastboro
                  example: Eastboro
                state_region:
                  type: string
                  default: MA
                  example: MA
                postal_code:
                  type: string
                  default: 90210
                  example: 90210
                phone:
                  type: string
                  default: (508) 867-5309
                  example: (508) 867-5309
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              organization_uuid:
                type: string
                format: uuid
              updated:
                type: boolean
    '403':
      description: Not authorized
    default:
      description: Default response for POST /organizationUpdate
