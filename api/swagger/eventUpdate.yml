post:
  summary: Update an Event on the platform
  tags:
    - event
  description: Updates an Event Team when supplied with its details. Returns `team_uuid`.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: Event update information
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              default: update
              examples:
                update:
                  value: update
                delete:
                  value: delete
            team:
              type: object
              properties:
                event_uuid:
                  type: string
                  format: uuid
                organization_uuid:
                  type: string
                  format: uuid
                ts_event_start:
                  type: string
                  format: date-time
                ts_event_end:
                  type: string
                  format: date-time
                event_judging_minutes:
                  type: number
                event_status_id:
                  type: number
                cloud_accounts_enabled:
                  type: boolean
                event_type_id:
                  type: number
                event_team_form_mode_id:
                  type: number
                event_details:
                  type: object
                  properties:
                    event_name:
                      type: string
                    event_summary:
                      type: string
                    event_description:
                      type: string
        examples:
          updateEvent:
            summary: Update Event
            value:
              action: update
              event:
                event_uuid: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                organization_uuid: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                ts_event_start: 2023-11-15T15:19:04.935Z
                ts_event_end: 2023-11-15T15:19:04.935Z
                event_judging_minutes: 60
                event_status_id: 1
                cloud_accounts_enabled: false
                event_type_id: 1
                event_team_form_mode_id: 1
                event_details:
                  event_name: string
                  event_summary: string
                  event_description: string
          deleteEvent:
            summary: Delete Event
            value:
              action: delete
              event:
                event_uuid: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                organization_uuid: 3fa85f64-5717-4562-b3fc-2c963f66afa6
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              event_uuid:
                type: string
                format: uuid
              updated:
                type: boolean
    '403':
      description: Not authorized
    default:
      description: Default response for POST /eventUpdate
