get:
  summary: Retrieve details of one or many Event Participants
  tags:
    - participant
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: organization_uuid
      in: query
      description: Organization UUID
      required: false
      schema:
        type: string
        format: uuid
    - name: event_uuid
      in: query
      description: Event UUID
      required: false
      schema:
        type: string
        format: uuid
    - name: user_uuid
      in: query
      description: User UUID
      required: false
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                participant_uuid:
                  type: string
                  format: uuid
                user_uuid:
                  type: string
                  format: uuid
                event_uuid:
                  type: string
                  format: uuid
                is_active:
                  type: boolean
                first_name:
                  type: string
                last_name:
                  type: string
                email_address:
                  type: string
                  format: email
                ts_last_login:
                  type: string
                  format: date-time
                user_tags:
                  type: object
                  properties:
                    skills:
                      type: array
                      items:
                        type: string
                      example: [python,java,mysql]
                participant_roles:
                  type: array
                  items:
                    type: object
                    properties:
                      participant_role_id:
                        type: number
                        format: int32
                      participant_role_name:
                        type: string
                        example: Spectator|Player|SME|Judge
                participant_teams:
                  type: array
                  items:
                    type: object
                    properties:
                      team_uuid:
                        type: string
                        format: uuid
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /participantRead
