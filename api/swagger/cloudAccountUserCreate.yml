post:
  summary: Create a Cloud Account User on the platform
  tags:
    - cloudAccount
  description: Used for granting a User access to a Cloud Account
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: Cloud Account User payload
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - $ref: '#/components/schemas/cloudAccountUserCreate_teamPayload'
            - $ref: '#/components/schemas/cloudAccountUserCreate_eventPayload'
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: number
                example: 200
              cloud_account_user_uuid:
                type: string
                format: uuid
    '403':
      description: Not authorized
    default:
      description: Default response for POST /cloudAccountUserCreate
components:
  schemas:
    cloudAccountUserCreate_eventPayload:
      type: object
      properties:
        cloud_account_user:
          type: object
          properties:
            user_uuid:
              type: string
              format: uuid
            event_uuid:
              type: string
              format: uuid
            access_level:
              type: number 
              example: 1
    cloudAccountUserCreate_teamPayload:
      type: object
      properties:
        cloud_account_user:
          type: object
          properties:
            user_uuid:
              type: string
              format: uuid
            team_uuid:
              type: string
              format: uuid
            access_level:
              type: number 
              example: 1
