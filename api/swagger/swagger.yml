openapi: 3.1.0
info:
  title: stackref_main
  description: >
    This is the primary API for all StackRef calls from the Primary Frontend,
    the Coach application, and the Websocket server.
  version: 1.11.0
  contact:
    name: Keith McDuffee
    email: keith@stackref.com
servers:
  - url: https://api.example.com
  - url: https://demo.example.com/api
  - url: https://{apigw_id}.execute-api.us-east-1.amazonaws.com
    variables:
      apigw_id:
        description: The AWS API Gateway ID
        default: 33t7jq9x85
paths:
  /amznMktEntitlement:
    $ref: './amzMktEntitlement.yml'
  /assetCreate:
