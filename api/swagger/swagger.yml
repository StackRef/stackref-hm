components:
  schemas:
    ResponseMetadata:
      type: object
      properties:
        RequestId:
          type: string
          format: uuid
        HTTPStatusCode:
          type: number
          format: int32
          example: 200
        HTTPHeaders:
          type: object
          properties:
            x-amzn-requestid:
              type: string
              format: uuid
            content-type:
              type: string
              example: application/json
            content-length:
              type: string
              example: '2364'
            date:
              type: string
              format: date-time
        RetryAttempts:
          type: number
          format: int32
        numberOfRecordsUpdated:
          type: number
          format: int32
        records:
          type: array
          items:
            type: object
            properties:
              stringValue:
                type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        **Auth0 JWT**
        
        This must be retrieved from the front-end after one logs in, or via a backend service authentication.
      bearerFormat: JWT
    stripe-signature:
      type: apiKey
      in: header
      name: stripe-signature
      description: |
        **Stripe Signature**
        
        Private key signature that Stripe sends via webhook
