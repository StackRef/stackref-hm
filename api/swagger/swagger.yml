  /judgingCriterionCreate:
    $ref: './judgingCriterionCreate.yml'
  /judgingCriterionRead:
    $ref: './judgingCriterionRead.yml'
  /judgingCriterionUpdate:
    $ref: './judgingCriterionUpdate.yml'
  /kanbanRead:
