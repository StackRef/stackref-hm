post:
  summary: Update an existing User on the platform
  tags:
    - user
  description: Updates and existing User when supplied with its details. Returns status code.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: User update information
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
            user:
              type: object
              properties:
                user_uuid:
                  type: string
                  format: uuid
                organization_uuid:
                  type: string
                  format: uuid
                first_name:
                  type: string
                last_name:
                  type: string
                email_address:
                  type: string
                  format: email
                settings:
                  type: object
                  properties:
                    setting_name_1:
                      type: string
                    setting_name_2:
                      type: string
                tags:
                  type: object
                  properties:
                    skills:
                      type: array
                      items:
                        type: string
                user_roles:
                  type: array
                  items:
                    type: number
        examples:
          updateUser:
            summary: Update User
            value:
              user:
                user_uuid: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
                organization_uuid: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
                first_name: string
                last_name: string
                email_address: string
                settings:
                  setting_name_1: string
                  setting_name_2: string
                tags:
                  skills: [python,java,mysql]
                user_roles: [1, 2, 3]
          updateRoles:
            summary: Update User Roles
            value:
              action: update_roles
              user:
                user_uuid: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
                organization_uuid: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
                user_roles: [1, 2, 3]
          removeUserFromOrg:
            summary: Remove User from Organization
            value:
              action: remove_from_org
              user:
                user_uuid: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
                organization_uuid: 507c3ad0-bfb8-4ae6-9bb0-e9ee047730b1
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              organization_uuid:
                type: string
                format: uuid
              updated:
                type: boolean
    '403':
      description: Not authorized
    default:
      description: Default response for POST /userUpdate
