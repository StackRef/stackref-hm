post:
  summary: Create a new Event Participant on the platform
  tags:
    - participant
  description: Creates a new Event Participant when supplied with its details. Returns `participant_uuid`.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: Participant creation information
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              default: create
              example: create
            participant:
              type: object
              properties:
                user_uuid:
                  type: string
                  format: uuid
                event_uuid:
                  type: string
                  format: uuid
                participant_role_id:
                  type: number
                  format: int32
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              participant_uuid:
                type: string
                format: uuid
              created:
                type: boolean
    '403':
      description: Not authorized
    default:
      description: Default response for POST /participantCreate
