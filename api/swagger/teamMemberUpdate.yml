post:
  summary: Update a Team Member on the platform
  tags:
    - teamMember
  description: Updates a Team Member when supplied with its details. Returns `team_member_uuid`.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: Team Member update information
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              example: delete|update_roles
            team_member:
              type: object
              properties:
                team_member_uuid:
                  type: string
                  format: uuid
                team_uuid:
                  type: string
                  format: uuid
                team_member_roles:
                  type: array
                  items:
                    type: number
                    example: [1, 2, 3]
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              participant_uuid:
                type: string
                format: uuid
    '403':
      description: Not authorized
    default:
      description: Default response for POST /teamMemberUpdate
