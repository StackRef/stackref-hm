get:
  summary: Retrieve details of one or many Teams
  tags:
    - team
  description: Updates and existing Organization when supplied with its details. Returns status code.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: event_uuid
      in: query
      description: |
        Event UUID
      required: false
      schema:
        type: string
        format: uuid
    - name: team_uuid
      in: query
      description: |
        Team UUID
      required: false
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                team_uuid:
                  type: string
                  format: uuid
                event_uuid:
                  type: string
                  format: uuid
                team_details:
                  type: object
                  properties:
                    team_name:
                      type: string
                    team_description:
                      type: string
                team_status_name:
                  type: string
                  example: Ready|Not Ready|Archived
                team_total_score:
                  type: number
                  format: double
                bank_balance:
                  type: number
                  format: double
                team_member_roles:
                  type: array
                  items:
                    type: object
                    properties:
                      team_member_role_id:
                        type: number
                        format: int32
                      team_member_role_name:
                        type: string
                        example: Player|Captain
                team_members:
                  type: array
                  items:
                    type: object
                    properties:
                      team_member_uuid:
                        type: string
                        format: uuid
                      participant_uuid:
                        type: string
                        format: uuid
                team_external_links:
                  type: array
                  items:
                    type: object
                    properties:
                      team_external_link_uuid:
                        type: string
                        format: uuid
                      team_private:
                        type: boolean
                      external_link_type_name:
                        type: string
                      team_external_link_name:
                        type: string
                      team_external_link_url:
                        type: string
                        format: uri
                cloud_account:
                  type: object
                  properties:
                    cloud_account_uuid:
                      type: string
                      format: uuid
                    cloud_account_name:
                      type: string
                banner_image_uuid:
                  type: string
                  format: uuid
                avatar_image_uuid:
                  type: string
                  format: uuid
                codecommit_info:
                  type: object
                  properties:
                    team_codecommit_repo_url:
                      type: string
                    team_codecommit_user:
                      type: string
                    team_codecommit_password:
                      type: string
                      format: password
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /teamRead
