get:
  summary: Retrieve details of one or many Organizations
  tags:
    - organization
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: organization_uuid
      in: query
      description: |
        Organization UUID

        Only required if the Bearer token is for a User only with grants to Read that Organization's details
      required: false
      schema:
        type: string
        format: uuid
        example: c2b55dce-c710-4d8e-9ab5-cec08250a5bc
        default: c2b55dce-c710-4d8e-9ab5-cec08250a5bc
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                organization_uuid:
                  type: string
                  format: uuid
                organization_name:
                  type: string
                  format: email
                organization_domain:
                  type: string
                  example: acme.com
                organization_logo_image:
                  type: string
                  format: binary
                primary_contact_email:
                  type: string
                  format: email
                street_address_1:
                  type: string
                  example: 1 Foobar Rd.
                street_address_2:
                  type: string
                  example: 2nd Floor
                city:
                  type: string
                state_region:
                  type: string
                  example: MA
                postal_code:
                  type: string
                  example: 01532
                phone:
                  type: string
                  example: (508) 867-5309
                organization_status:
                  type: string
                  example: Active|On Hold
                bank_balance:
                  type: number
                  format: int32
                amazon_marketplace_entitlements:
                  type: array
                  items:
                    type: object
                    properties:
                      entitlement_uuid:
                        type: string
                        format: uuid
                user_roles:
                  type: array
                  items:
                    type: object
                    properties:
                      user_role_id:
                        type: number
                        format: int32
                      user_role_name:
                        type: string
                        example: Owner|Admin|Standard
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /organizationRead
