post:
  summary: Create a new Team on the platform
  tags:
    - team
  description: Creates a new Team when supplied with its details. Returns `team_uuid`.
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: Team creation information
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              default: create
              example: create
            team:
              type: object
              properties:
                event_uuid:
                  type: string
                  format: uuid
                team_details:
                  type: object
                  properties:
                    team_name:
                      type: string
                    team_description:
                      type: string
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              team_uuid:
                type: string
                format: uuid
              created:
                type: boolean
    '403':
      description: Not authorized
    default:
      description: Default response for POST /teamCreate
