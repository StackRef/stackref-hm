post:
  summary: Update a Cloud Account User on the platform and cloud
  tags:
    - cloudAccount
  description: Used for removing a User's access to Cloud Account Groups
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
  requestBody:
    description: Cloud Account User payload
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - $ref: '#/components/schemas/cloudAccountUserUpdate_defaultPayload'
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: number
                example: 200
              user_uuid:
                type: string
                format: uuid
              cloud_account_user_id:
                type: string
    '403':
      description: Not authorized
    default:
      description: Default response for POST /cloudAccountUserUpdate
components:
  schemas:
    cloudAccountUserUpdate_defaultPayload:
      type: object
      properties:
        action:
          type: string
          example: eject
        cloud_account_user:
          type: object
          properties:
            user_uuid:
              type: string
              format: uuid
            entity_uuid:
              type: string
              format: uuid
