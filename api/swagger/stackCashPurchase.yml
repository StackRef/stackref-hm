get:
  summary: Retrieve/update details of an Amazon Marketplace entitlement
  tags:
    - stackCash
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: organization_uuid
      in: query
      description: |
        Organization UUID

        Only necessary when being called from a non-user or platform admin
      required: false
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
    '204':
      description: No results
    '403':
      description: Not authorized
    default:
      description: Default response for GET /stackCashPurchase
post:
  summary: Process a payment request
  tags:
    - stackCash
  description: Used for processing a purchase request
  security:
    - bearerAuth: []
  parameters:
    - name: x-sr-application
      in: header
      description: What application/version is calling the API
      required: true
      style: simple
      schema:
        type: string
        default: SR/Swagger
    - name: organization_uuid
      in: query
      description: |
        Organization UUID

        Only necessary when being called from a non-user or platform admin
      required: false
      schema:
        type: string
        format: uuid
  requestBody:
    description: Payment details payload
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            action:
              type: string
              default: purchase
            purchase_details:
              type: object
              properties:
                method:
                  type: string
                  default: stripe|amz_mkt_metering
                quantity:
                  type: number
                  format: double
  responses:
    '200':
      description: Successful operation
      headers:
        Content-Type:
          schema:
            type: string
          description: The MIME type of the payload
        Content-Length:
          schema:
            type: number
          description: Byte length of the payload
      content:
        application/json:
          schema:
            type: object
            properties:
              status_code:
                type: number
                format: int4
                default: 200
              marketplace_metering_uuid:
                type: string
                format: uuid
              organization_uuid:
                type: string
                format: uuid
              transaction_value:
                type: number
                format: double
                  
    '403':
      description: Not authorized
    default:
      description: Default response for POST /stackCashPurchase
