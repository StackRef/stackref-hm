oncurrent = 1
check_interval = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "{{ GITLAB_RUNNER_NAME }}"
  url = "https://gitlab.com/"
  token = "{{ GITLAB_RUNNER_TOKEN }}"
  executor = "docker"
  [runners.custom_build_dir]
  [runners.cache]
    [runners.cache.s3]
    [runners.cache.gcs]
    [runners.cache.azure]
  [runners.docker]
    tls_verify = false
    image = "000000000000.dkr.ecr.us-east-1.amazonaws.com/community/debian:10-slim"
    privileged = true
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/certs/client","/cache","/home/gitlab-runner/.docker/config.json:/root/.docker/config.json:ro","/root/go/bin/docker-credential-ecr-login:/bin/docker-credential-ecr-login:ro"]
    shm_size = 0